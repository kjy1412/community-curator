name: 커뮤니티 큐레이션

on:
  schedule:
    - cron: '0 23 * * *'
    - cron: '0 3 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  curate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 의존성 설치
        run: npm install
        working-directory: scripts
      - name: 큐레이션 실행
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/curate.js
      - name: RSS 피드 커밋 & 푸시
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/feed.xml docs/index.html
          git diff --staged --quiet || git commit -m "피드 업데이트: $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')"
          git push
